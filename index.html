<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patootie Mahjong</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a0a2e; min-height: 100vh; color: #f0e8ff; }
  #app { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
  #header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 26px; font-weight: 700; color: #e0a0ff; letter-spacing: 0.04em; }
  h1 span { color: #ff80cc; }
  #stats { display: flex; gap: 20px; font-size: 13px; color: #9080b0; }
  #stats strong { color: #f0e8ff; }
  #controls { display: flex; gap: 8px; }
  button {
    cursor: pointer; border: 1px solid #5a3080; background: #2a1040;
    color: #e0c0ff; border-radius: 8px; padding: 7px 16px;
    font-size: 13px; font-weight: 500; transition: background 0.15s;
  }
  button:hover { background: #3a1860; }
  button:active { transform: scale(0.97); }
  #board-wrap { overflow: auto; padding: 1rem 0; }
  #board { position: relative; margin: 0 auto; }

  .tile {
    position: absolute;
    width: 46px; height: 58px;
    border-radius: 8px;
    border: 1.5px solid #9060c0;
    background: #f8f0ff;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: 700;
    box-shadow: 2px 4px 0px #6030a0, 3px 6px 0px rgba(0,0,0,0.4);
    transition: box-shadow 0.12s, transform 0.12s, filter 0.12s;
    line-height: 1;
    gap: 1px;
  }
  .tile .letter { font-size: 20px; color: #2a0a4a; }
  .tile .label { font-size: 7px; font-weight: 600; letter-spacing: 0.04em; color: #9060c0; text-transform: uppercase; }

  /* suit colors */
  .tile.suit-patootie .letter { color: #b02080; }
  .tile.suit-patootie .label { color: #d060a0; }
  .tile.suit-manon .letter { color: #1060c0; }
  .tile.suit-manon .label { color: #4090e0; }
  .tile.suit-heart .letter { color: #c03030; }
  .tile.suit-heart .label { color: #e06060; }
  .tile.suit-star .letter { color: #806000; }
  .tile.suit-star .label { color: #c09020; }
  .tile.suit-bonus .letter { font-size: 18px; color: #207040; }
  .tile.suit-bonus .label { color: #409060; }

  .tile.blocked { filter: brightness(0.65) saturate(0.5); cursor: not-allowed; }
  .tile.selected {
    background: #e8d0ff; border-color: #a040ff;
    box-shadow: 2px 4px 0px #7020c0, 3px 6px 0px rgba(0,0,0,0.35), 0 0 0 2px #a040ff88;
    transform: translateY(-3px); z-index: 9999 !important;
  }
  .tile:not(.blocked):not(.matched):hover { transform: translateY(-2px); filter: brightness(1.06); }
  .tile.matched { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .tile.hint {
    background: #d0ffe8 !important; border-color: #20b070 !important;
    box-shadow: 2px 4px 0px #0f7050, 3px 6px 0px rgba(0,0,0,0.3), 0 0 0 2px #20b07066 !important;
    transform: translateY(-2px) !important;
  }

  #msg { text-align: center; padding: 0.8rem 1rem; font-size: 15px; color: #b090d0; min-height: 44px; }
  #msg.win { color: #ff80cc; font-size: 18px; font-weight: 700; }
  #msg.fail { color: #e07050; }

  #legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #9080b0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>Patootie <span>Mahjong</span></h1>
      <div id="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#b02080"></div> PATOOTIE suit</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1060c0"></div> MANON suit</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c03030"></div> Hearts</div>
        <div class="legend-item"><div class="legend-dot" style="background:#806000"></div> Stars</div>
        <div class="legend-item"><div class="legend-dot" style="background:#207040"></div> Bonus</div>
      </div>
    </div>
    <div>
      <div id="stats" style="margin-bottom:8px;">
        Tiles left: <strong id="stat-tiles">-</strong>
        &nbsp;|&nbsp; Matches: <strong id="stat-matches">0</strong>
        &nbsp;|&nbsp; Time: <strong id="stat-time">0:00</strong>
      </div>
      <div id="controls" style="justify-content:flex-end;display:flex;">
        <button id="btn-hint">Hint</button>
        <button id="btn-undo">Undo</button>
        <button id="btn-new">New Game</button>
      </div>
    </div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>
  <div id="msg">Select a free tile to begin!</div>
</div>

<script>
// ── Tile definitions ─────────────────────────────────────────────────────────
// PATOOTIE suit: 8 letters × 4 copies = 32 tiles
const PATOOTIE = ['P','A','T','O','O','T','I','E'];
// MANON suit: 5 letters × 4 copies = 20 tiles  (M,A,N,O,N — duplicates match)
const MANON    = ['M','A','N','O','N'];
// Hearts: ♥ symbols 1-9 × 4 = 36 tiles
const HEARTS   = ['♥1','♥2','♥3','♥4','♥5','♥6','♥7','♥8','♥9'];
// Stars: ★ symbols 1-9 × 4 = 36 tiles
const STARS    = ['★1','★2','★3','★4','★5','★6','★7','★8','★9'];
// Bonus (flowers/seasons style — match any within group): 4+4 = 8 tiles
const FLOWERS  = ['🌸','🌺','🌼','🌻'];
const GEMS     = ['💎','💜','✨','🔮'];

function makePool(){
  const pool=[];
  // PATOOTIE — letter at index i matches same index (so both 'T' at index 2 match each other, both 'O' at 3&4...)
  // We pair by position so T(idx2) matches T(idx2), O(idx3) matches O(idx3), etc.
  PATOOTIE.forEach((l,i)=>{
    for(let n=0;n<4;n++) pool.push({key:'pat_'+i, disp:l, sub:'patootie', suit:'suit-patootie'});
  });
  // MANON — same approach, pair by position
  MANON.forEach((l,i)=>{
    for(let n=0;n<4;n++) pool.push({key:'man_'+i, disp:l, sub:'manon', suit:'suit-manon'});
  });
  // Hearts
  HEARTS.forEach((h,i)=>{
    for(let n=0;n<4;n++) pool.push({key:'heart_'+i, disp:h[1], sub:'♥', suit:'suit-heart'});
  });
  // Stars
  STARS.forEach((s,i)=>{
    for(let n=0;n<4;n++) pool.push({key:'star_'+i, disp:s[1], sub:'★', suit:'suit-star'});
  });
  // Bonus — flowers match any flower, gems match any gem
  FLOWERS.forEach(f=>pool.push({key:'flower', disp:f, sub:'flower', suit:'suit-bonus'}));
  GEMS.forEach(g=>pool.push({key:'gem', disp:g, sub:'gem', suit:'suit-bonus'}));
  return pool;
}

function sameTile(a,b){
  if(a.key==='flower'&&b.key==='flower') return true;
  if(a.key==='gem'&&b.key==='gem') return true;
  return a.key===b.key;
}

// ── Layout (turtle) ──────────────────────────────────────────────────────────
const LAYOUT=[];
(function(){
  function row(l,r,c0,c1){ for(let c=c0;c<=c1;c++) LAYOUT.push([l,r,c]); }
  for(let r=0;r<8;r++) row(0,r,0,13);
  LAYOUT.push([0,3,-1],[0,4,-1],[0,3,14],[0,4,14]);
  for(let r=1;r<7;r++) row(1,r,1,12);
  for(let r=2;r<6;r++) row(2,r,2,11);
  for(let r=2;r<6;r++) row(3,r,3,10);
  for(let r=3;r<5;r++) row(4,r,4,9);
  for(let r=3;r<5;r++) row(5,r,5,8);
  LAYOUT.push([6,3,6],[6,3,7],[6,4,6],[6,4,7]);
  LAYOUT.push([7,3,6],[7,4,6]);
})();

const TILE_W=50, TILE_H=62, OFF=6;
let tiles=[], selected=null, history=[], matches=0, timer=0, timerInt=null;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function isBlocked(t){
  if(t.matched) return true;
  const left =tiles.some(o=>!o.matched&&o.layer===t.layer&&o.row===t.row&&o.col===t.col-1);
  const right=tiles.some(o=>!o.matched&&o.layer===t.layer&&o.row===t.row&&o.col===t.col+1);
  const above=tiles.some(o=>!o.matched&&o.layer===t.layer+1&&Math.abs(o.row-t.row)<=0&&Math.abs(o.col-t.col)<=1);
  return (left&&right)||above;
}

function buildBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const pool=shuffle(makePool()).slice(0,LAYOUT.length);
  while(pool.length<LAYOUT.length) pool.push(pool[pool.length%pool.length]);

  tiles=LAYOUT.map((pos,i)=>({
    id:i, layer:pos[0], row:pos[1], col:pos[2],
    key:pool[i].key, disp:pool[i].disp, sub:pool[i].sub, suit:pool[i].suit,
    matched:false, el:null
  }));

  const minC=Math.min(...LAYOUT.map(p=>p[2]));
  const maxC=Math.max(...LAYOUT.map(p=>p[2]));
  const maxR=Math.max(...LAYOUT.map(p=>p[1]));
  const maxL=Math.max(...LAYOUT.map(p=>p[0]));
  const bw=(maxC-minC+2)*TILE_W+maxL*OFF+40;
  const bh=(maxR+2)*TILE_H+maxL*OFF+40;
  board.style.width=bw+'px'; board.style.height=bh+'px';

  tiles.forEach(t=>{
    const el=document.createElement('div');
    el.className='tile '+t.suit;
    // letter
    const letterEl=document.createElement('div');
    letterEl.className='letter';
    letterEl.textContent=t.disp;
    // sublabel
    const labelEl=document.createElement('div');
    labelEl.className='label';
    labelEl.textContent=t.sub;
    el.appendChild(letterEl);
    el.appendChild(labelEl);

    const x=(t.col-minC)*TILE_W+t.layer*OFF+20;
    const y=t.row*TILE_H-t.layer*OFF+20;
    el.style.left=x+'px'; el.style.top=y+'px';
    el.style.zIndex=(t.layer+1)*20+(7-t.row);
    el.addEventListener('click',()=>clickTile(t));
    board.appendChild(el);
    t.el=el;
  });

  selected=null; history=[]; matches=0;
  document.getElementById('stat-matches').textContent='0';
  document.getElementById('stat-tiles').textContent=tiles.length;
  setMsg('Select a free tile to begin!','');
  updateAll();
  startTimer();
}

function updateAll(){
  tiles.forEach(t=>{
    if(!t.el) return;
    if(t.matched){ t.el.classList.add('matched'); return; }
    t.el.classList.remove('matched','selected','hint');
    t.el.classList.toggle('blocked',isBlocked(t));
  });
  if(selected&&!selected.matched) selected.el.classList.add('selected');
}

function clickTile(t){
  if(t.matched||isBlocked(t)){ setMsg('That tile is blocked — try a free one.',''); return; }
  if(selected===null){ selected=t; updateAll(); return; }
  if(selected===t){ selected=null; updateAll(); return; }
  if(sameTile(selected,t)){
    history.push([selected,t]);
    selected.matched=true; t.matched=true;
    matches++;
    document.getElementById('stat-matches').textContent=matches;
    document.getElementById('stat-tiles').textContent=tiles.filter(x=>!x.matched).length;
    selected=null; updateAll();
    const left=tiles.filter(x=>!x.matched).length;
    if(left===0){ clearInterval(timerInt); setMsg('🎉 You cleared the board! Patootie forever!','win'); return; }
    if(!hasMoves()){ clearInterval(timerInt); setMsg('No more moves — start a new game!','fail'); return; }
    setMsg('Nice match! Keep going ✨','');
  } else {
    selected=t; updateAll();
    setMsg('No match — try a different tile.','');
  }
}

function hasMoves(){
  const free=tiles.filter(t=>!t.matched&&!isBlocked(t));
  for(let i=0;i<free.length;i++)
    for(let j=i+1;j<free.length;j++)
      if(sameTile(free[i],free[j])) return true;
  return false;
}

function doHint(){
  const free=tiles.filter(t=>!t.matched&&!isBlocked(t));
  for(let i=0;i<free.length;i++)
    for(let j=i+1;j<free.length;j++)
      if(sameTile(free[i],free[j])){
        [free[i],free[j]].forEach(t=>{
          t.el.classList.add('hint');
          setTimeout(()=>t.el.classList.remove('hint'),1600);
        });
        setMsg('Hint: those two match!','');
        return;
      }
  setMsg('No moves left — start a new game!','fail');
}

function setMsg(txt,cls){
  const el=document.getElementById('msg');
  el.textContent=txt; el.className=cls||'';
}

function startTimer(){
  clearInterval(timerInt); timer=0;
  document.getElementById('stat-time').textContent='0:00';
  timerInt=setInterval(()=>{
    timer++;
    const m=Math.floor(timer/60), s=timer%60;
    document.getElementById('stat-time').textContent=m+':'+(s<10?'0':'')+s;
  },1000);
}

document.getElementById('btn-hint').addEventListener('click',doHint);
document.getElementById('btn-undo').addEventListener('click',()=>{
  if(!history.length){ setMsg('Nothing to undo.',''); return; }
  const [a,b]=history.pop();
  a.matched=false; b.matched=false;
  matches--;
  document.getElementById('stat-matches').textContent=matches;
  document.getElementById('stat-tiles').textContent=tiles.filter(x=>!x.matched).length;
  selected=null; updateAll();
  setMsg('Move undone.','');
});
document.getElementById('btn-new').addEventListener('click',()=>{ clearInterval(timerInt); buildBoard(); });

buildBoard();
</script>
</body>
</html>
